<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no"><meta name="theme-color" content="#000000"><link rel="manifest" href="/BlocksIDE/build/manifest.json"><link rel="shortcut icon" href="/BlocksIDE/build/favicon.ico"><title>React App</title><link href="/BlocksIDE/build/static/css/main.36ae78d3.css" rel="stylesheet">
<script>
window.addEventListener('load', function() {
  if (window.Blockly && window.Blockly.Flyout) {
    
    // 1. Keep the Event.path Polyfill (Still necessary for Chrome 109+)
    if (!Event.prototype.hasOwnProperty('path')) {
      Object.defineProperty(Event.prototype, 'path', {
        get: function() {
          return this.composedPath ? this.composedPath() : [];
        }
      });
    }

    // 2. Overwrite the broken Blockly Flyout Drag Handler
    window.Blockly.Flyout.prototype.blockMouseDown_ = function(block) {
      var flyout = this;
      return function(e) {
        if (window.Blockly.isRightButton(e)) {
          return;
        }
        window.Blockly.Flyout.terminateDrag_();
        
        // FIX A: Create the block FIRST before hiding anything. 
        // Because the flyout is visible, getScreenCTM() succeeds and coordinates are perfect!
        var newBlock = flyout.createBlock(block);
        
        // FIX B: Visually move the flyout out of the way instead of using display: none.
        // This prevents Chrome from firing "pointercancel" and killing your drag.
        var svgGroup = flyout.svgGroup_;
        var oldTransform = '';
        if (svgGroup) {
            oldTransform = svgGroup.getAttribute('transform') || '';
            // Throw it way off-screen so you can't accidentally drop the block back into it
            svgGroup.setAttribute('transform', 'translate(-100000, -100000)');
        }
        
        // FIX C: Wait until the user drops the block to actually hide the menu
        var cleanup = function() {
          window.removeEventListener('mouseup', cleanup);
          window.removeEventListener('touchend', cleanup);
          
          if (svgGroup) {
              // Restore the original position so it's ready for the next click
              svgGroup.setAttribute('transform', oldTransform);
          }
          // Now it is finally safe to let Blockly completely hide it
          flyout.hide();
        };
        window.addEventListener('mouseup', cleanup);
        window.addEventListener('touchend', cleanup);
        
        // Start the drag on the perfectly positioned block
        newBlock.onMouseDown_(e);
      };
    };
  }
});
</script>
</head><body><noscript>You need to enable JavaScript to run this app.</noscript><div id="root"></div><script type="text/javascript" src="/BlocksIDE/build/static/js/main.9589fc27.js"></script></body></html>
