<script>
  if (!Event.prototype.hasOwnProperty('path')) {
    Object.defineProperty(Event.prototype, 'path', {
      get: function() {
        // 1. If we already calculated and cached the path, return it immediately.
        if (this._cachedPath) return this._cachedPath;

        // 2. Try modern composedPath() first
        if (this.composedPath) {
          var cp = this.composedPath();
          if (cp && cp.length > 0) {
            this._cachedPath = cp;
            return cp;
          }
        }

        // 3. Fallback: Manual DOM traversal if composedPath() is already empty
        var path = [];
        var target = this.target;
        while (target) {
          path.push(target);
          target = target.parentElement || target.parentNode;
        }
        
        // Ensure standard global objects are at the end of the path
        if (path.length > 0 && path.indexOf(window) === -1) {
          path.push(document);
          path.push(window);
        }
        
        this._cachedPath = path;
        return path;
      }
    });
