<script>
  // Intercept events during the "capturing phase" (before Blockly processes them)
  // and permanently cache the path data so it survives asynchronous delays.
  ['mousedown', 'pointerdown', 'touchstart', 'mousemove', 'pointermove', 'touchmove'].forEach(function(eventType) {
    window.addEventListener(eventType, function(e) {
      if (!e.path) {
        // Forcefully attach the path array to the event object
        e.path = e.composedPath ? e.composedPath() : [];
        
        // Failsafe for deep React/Blockly shadow DOMs
        if (e.path.length === 0) {
          var path = [];
          var target = e.target;
          while (target) {
            path.push(target);
            target = target.parentNode || target.parentElement;
          }
          if (path.indexOf(window) === -1) {
            path.push(document);
            path.push(window);
          }
          e.path = path;
        }
      }
    }, true); // The 'true' here is critical—it means capturing phase!
  });
</script>
